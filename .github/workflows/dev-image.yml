name: Dev Image Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE: laris11/altmount

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/test

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          npm_package_version: dev-${{ github.sha }}
          GIT_COMMIT: ${{ github.sha }}
        run: bun run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: frontend/dist
          retention-days: 1

  prepare-dev-release:
    name: Ensure Dev Prerelease Exists
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Ensure rolling dev prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create dev \
            --prerelease \
            --title "Dev Build" \
            --notes "Rolling development build from main branch" \
            --target main 2>/dev/null \
            || gh release edit dev \
                --prerelease \
                --target main \
                --title "Dev Build" \
                --notes "Rolling development build from main branch (commit ${{ github.sha }})"

      - name: Delete previous dev assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=$(gh release view dev --json assets -q '.assets[].name' || true)
          if [ -n "$assets" ]; then
            echo "$assets" | while read -r asset; do
              [ -z "$asset" ] && continue
              echo "Deleting asset: $asset"
              gh release delete-asset dev "$asset" --yes || true
            done
          else
            echo "No existing assets on dev release"
          fi

  publish-dev-binaries:
    name: Publish Dev CLI Binaries
    needs: prepare-dev-release
    permissions:
      contents: write
    uses: ./.github/workflows/build-cli.yml
    with:
      version: dev-${{ github.sha }}
      commit: ${{ needs.prepare-dev-release.outputs.short_sha }}
      upload-to-release: true
      release-tag: dev
      prerelease: true

  build-dev-amd64:
    name: Build Dev Image (AMD64)
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "DockerHub credentials not set; skipping DockerHub publish (GHCR only)." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Container Registry (DockerHub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Normalize image name
        id: normalize
        run: echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get timestamp
        id: timestamp
        run: echo "timestamp=$(TZ='America/New_York' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
      - name: Compute image tags
        id: imgtags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ steps.normalize.outputs.image_name }}:dev-amd64-temp"
          if [ "${{ steps.dockerhub.outputs.enabled }}" = "true" ]; then
            TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:dev-amd64-temp"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push AMD64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/amd64
          push: true
          tags: ${{ steps.imgtags.outputs.tags }}
          cache-from: type=gha,scope=dev-amd64
          cache-to: type=gha,mode=max,scope=dev-amd64
          provenance: false
          sbom: false
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=dev-${{ github.sha }}

  build-dev-arm64:
    name: Build Dev Image (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: build-frontend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "DockerHub credentials not set; skipping DockerHub publish (GHCR only)." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Container Registry (DockerHub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Normalize image name
        id: normalize
        run: echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get timestamp
        id: timestamp
        run: echo "timestamp=$(TZ='America/New_York' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
      - name: Compute image tags
        id: imgtags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ steps.normalize.outputs.image_name }}:dev-arm64-temp"
          if [ "${{ steps.dockerhub.outputs.enabled }}" = "true" ]; then
            TAGS="${TAGS},${{ env.DOCKERHUB_IMAGE }}:dev-arm64-temp"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push ARM64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.ci
          platforms: linux/arm64
          push: true
          tags: ${{ steps.imgtags.outputs.tags }}
          cache-from: type=gha,scope=dev-arm64
          cache-to: type=gha,mode=max,scope=dev-arm64
          provenance: false
          sbom: false
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VERSION=dev-${{ github.sha }}

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-dev-amd64, build-dev-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check DockerHub credentials
        id: dockerhub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "DockerHub credentials not set; skipping DockerHub publish (GHCR only)." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Container Registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Container Registry (DockerHub)
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Normalize image name
        id: normalize
        run: echo "image_name=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Get timestamp
        id: timestamp
        run: echo "timestamp=$(TZ='America/New_York' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create and push manifest (GHCR)
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ steps.normalize.outputs.image_name }}
          AMD64_IMAGE="${IMAGE}:dev-amd64-temp"
          ARM64_IMAGE="${IMAGE}:dev-arm64-temp"
          TIMESTAMP_TAG="dev_${{ steps.timestamp.outputs.timestamp }}"

          docker manifest create ${IMAGE}:dev $AMD64_IMAGE $ARM64_IMAGE
          docker manifest push ${IMAGE}:dev

          docker manifest create ${IMAGE}:${TIMESTAMP_TAG} $AMD64_IMAGE $ARM64_IMAGE
          docker manifest push ${IMAGE}:${TIMESTAMP_TAG}

      - name: Create and push manifest (DockerHub)
        if: steps.dockerhub.outputs.enabled == 'true'
        run: |
          DH=${{ env.DOCKERHUB_IMAGE }}
          AMD64_IMAGE="${DH}:dev-amd64-temp"
          ARM64_IMAGE="${DH}:dev-arm64-temp"
          TIMESTAMP_TAG="dev_${{ steps.timestamp.outputs.timestamp }}"

          docker manifest create ${DH}:dev $AMD64_IMAGE $ARM64_IMAGE
          docker manifest push ${DH}:dev

          docker manifest create ${DH}:${TIMESTAMP_TAG} $AMD64_IMAGE $ARM64_IMAGE
          docker manifest push ${DH}:${TIMESTAMP_TAG}

      - name: Clean up temporary tags
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ steps.normalize.outputs.image_name }}
          docker manifest rm ${IMAGE}:dev-amd64-temp || true
          docker manifest rm ${IMAGE}:dev-arm64-temp || true
          docker manifest rm ${{ env.DOCKERHUB_IMAGE }}:dev-amd64-temp || true
          docker manifest rm ${{ env.DOCKERHUB_IMAGE }}:dev-arm64-temp || true
