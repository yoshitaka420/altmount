openapi: 3.0.0
info:
  contact:
    name: AltMount
    url: https://github.com/javi11/altmount/issues
  description: REST API for AltMount — Usenet WebDAV server with NZB queue, health
    monitoring, ARR integration, FUSE/rclone mounting, and Stremio addon.
  license:
    name: MIT
  termsOfService: http://altmount.kipsilabs.top
  title: AltMount API
  version: "1.0"
paths:
  /arrs/download-client/register:
    post:
      description: Automatically registers AltMount as a download client
        (SABnzbd-compatible) in all configured ARR instances.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Register ARR download clients
      tags:
        - ARRs
  /arrs/download-client/test:
    post:
      description: Tests whether AltMount is reachable as a download client from all
        configured ARR instances.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Test ARR download clients
      tags:
        - ARRs
  /arrs/health:
    get:
      description: Returns health check results from all configured Sonarr/Radarr instances.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get ARR health
      tags:
        - ARRs
  /arrs/instances:
    get:
      description: Returns all configured Sonarr/Radarr instances.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: List ARR instances
      tags:
        - ARRs
  "/arrs/instances/{type}/{name}":
    get:
      description: Returns a specific Sonarr/Radarr instance by type and name.
      parameters:
        - description: Instance type (sonarr or radarr)
          in: path
          name: type
          required: true
          schema:
            type: string
        - description: Instance name
          in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get ARR instance
      tags:
        - ARRs
  /arrs/instances/test:
    post:
      description: Tests connectivity to a Sonarr/Radarr instance with given credentials.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.TestConnectionRequest"
        description: Instance connection details
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Test ARR connection
      tags:
        - ARRs
  /arrs/stats:
    get:
      description: Returns sync statistics for all configured ARR instances.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get ARR statistics
      tags:
        - ARRs
  /arrs/webhook:
    post:
      description: Receives file-import webhook events from Sonarr/Radarr and triggers
        health checks. Authenticated via API key query parameter.
      parameters:
        - description: AltMount API key
          in: query
          name: apikey
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.ArrsWebhookRequest"
        description: Webhook payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - ApiKeyAuth: []
      summary: ARR webhook receiver
      tags:
        - ARRs
  /arrs/webhook/register:
    post:
      description: Automatically registers AltMount as a webhook connection in all
        configured Sonarr/Radarr instances.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Register ARR webhooks
      tags:
        - ARRs
  /auth/config:
    get:
      description: Returns authentication configuration (login required flag,
        available providers). Public endpoint.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      summary: Get auth config
      tags:
        - Auth
  /auth/login:
    post:
      description: Authenticates with username and password and returns a JWT access
        token. Rate-limited to 10/min per IP.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.LoginRequest"
        description: Login credentials
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.AuthResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      summary: Login
      tags:
        - Auth
  /auth/register:
    post:
      description: Creates the first admin user account. Only allowed when no users
        exist yet.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.RegisterRequest"
        description: Registration details
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.AuthResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      summary: Register
      tags:
        - Auth
  /auth/registration-status:
    get:
      description: Returns whether registration is currently open (i.e. no users exist yet).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      summary: Check registration status
      tags:
        - Auth
  /config:
    get:
      description: Returns the current AltMount configuration with sensitive values masked.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.ConfigAPIResponse"
                    type: object
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get configuration
      tags:
        - Config
    put:
      description: Replaces the entire AltMount configuration. Triggers restart if required.
      requestBody:
        content:
          application/json:
            schema:
              type: object
        description: Complete configuration object
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Update configuration
      tags:
        - Config
  "/config/{section}":
    patch:
      description: Updates a specific named section of the configuration (e.g. import,
        sabnzbd, rclone).
      parameters:
        - description: Config section name
          in: path
          name: section
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        description: Section configuration
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Patch configuration section
      tags:
        - Config
  "/config/providers/{id}/speedtest":
    post:
      description: Runs a speed test against the specified NNTP provider and saves the
        result to config.
      parameters:
        - description: Provider ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.ProviderSpeedTestResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Test provider download speed
      tags:
        - Providers
  /config/reload:
    post:
      description: Reloads the AltMount configuration from disk without restarting.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Reload configuration
      tags:
        - Config
  /config/validate:
    post:
      description: Validates a configuration object without saving it.
      requestBody:
        content:
          application/json:
            schema:
              type: object
        description: Configuration to validate
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Validate configuration
      tags:
        - Config
  /files/active-streams:
    get:
      description: Returns all currently active NZB file streams. Optionally filter by
        type=file.
      parameters:
        - description: Filter by source type (e.g. file)
          in: query
          name: type
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: List active streams
      tags:
        - Files
  "/files/active-streams/{id}":
    delete:
      description: Terminates an active NZB file stream by ID.
      parameters:
        - description: Stream ID
          in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Kill active stream
      tags:
        - Files
  /files/export-batch:
    post:
      description: Exports multiple mounted files as NZBs packed in a single ZIP archive.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                paths:
                  items:
                    type: string
                  type: array
              type: object
        description: Virtual paths to export
        required: true
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          content:
            application/zip:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/zip:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Batch export files as NZBs
      tags:
        - Files
  /files/export-nzb:
    get:
      description: Exports the metadata of a mounted file back to a downloadable NZB file.
      parameters:
        - description: Virtual path to the file
          in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          content:
            application/x-nzb:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/x-nzb:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Export file metadata as NZB
      tags:
        - Files
  /files/info:
    get:
      description: Returns metadata for a mounted NZB file including segment info,
        encryption, and status.
      parameters:
        - description: Virtual path to the file
          in: query
          name: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.FileMetadataResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get file metadata
      tags:
        - Files
  /files/streams/history:
    get:
      description: Returns a history of recently completed NZB file streams.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get stream history
      tags:
        - Files
  /fuse/force-stop:
    post:
      description: Force-unmounts the FUSE filesystem using platform-specific commands
        (fusermount/umount).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Force stop FUSE mount
      tags:
        - FUSE
  /fuse/start:
    post:
      description: Mounts the NZB filesystem at the given path using FUSE.
      requestBody:
        content:
          application/json:
            schema:
              properties:
                path:
                  type: string
              type: object
        description: Mount path
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Start FUSE mount
      tags:
        - FUSE
  /fuse/status:
    get:
      description: Returns the current status of the FUSE mount (stopped, starting,
        running, error).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get FUSE status
      tags:
        - FUSE
  /fuse/stop:
    post:
      description: Gracefully unmounts the FUSE filesystem.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Stop FUSE mount
      tags:
        - FUSE
  /health:
    get:
      description: Returns a paginated list of file health records with optional
        status/search filters.
      parameters:
        - description: Filter by status
          in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - checking
              - corrupted
              - repair_triggered
              - healthy
        - description: Search by file path
          in: query
          name: search
          schema:
            type: string
        - description: Sort field
          in: query
          name: sort_by
          schema:
            type: string
            enum:
              - file_path
              - created_at
              - status
              - priority
              - last_checked
              - scheduled_check_at
        - description: Sort direction
          in: query
          name: sort_order
          schema:
            type: string
            enum:
              - asc
              - desc
        - description: ISO8601 timestamp filter
          in: query
          name: since
          schema:
            type: string
        - description: Page size (default 50)
          in: query
          name: limit
          schema:
            type: integer
        - description: Page offset
          in: query
          name: offset
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        items:
                          $ref: "#/components/schemas/api.HealthItemResponse"
                        type: array
                      meta:
                        $ref: "#/components/schemas/api.APIMeta"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: List health records
      tags:
        - Health
  "/health/{id}":
    delete:
      description: Deletes a health record and optionally the associated physical file.
      parameters:
        - description: Health record ID
          in: path
          name: id
          required: true
          schema:
            type: integer
        - description: Also delete the physical file
          in: query
          name: delete_file
          schema:
            type: boolean
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Delete health record
      tags:
        - Health
    get:
      description: Returns a single health record by ID.
      parameters:
        - description: Health record ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.HealthItemResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Get health record
      tags:
        - Health
  "/health/{id}/cancel":
    post:
      description: Cancels an in-progress health check for a file.
      parameters:
        - description: Health record ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Cancel health check
      tags:
        - Health
  "/health/{id}/check-now":
    post:
      description: Triggers an immediate health check for a file, bypassing the queue.
      parameters:
        - description: Health record ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.HealthItemResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Trigger immediate health check
      tags:
        - Health
  "/health/{id}/priority":
    post:
      description: Sets the checking priority for a health record.
      parameters:
        - description: Health record ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                priority:
                  type: string
              type: object
        description: "Priority: normal or high"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/api.APIResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/api.HealthItemResponse"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Set health check priority
      tags:
        - Health
  "/health/{id}/repair":
    post:
      description: Triggers a repair attempt for a corrupted file.
      parameters:
        - description: Health record ID
          in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api.HealthRepairRequest"
        description: Repair options
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
