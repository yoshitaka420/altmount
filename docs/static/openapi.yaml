                        $ref: "#/components/schemas/api.AuthResponse"
                    type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api.APIResponse"
      security:
        - BearerAuth: []
      summary: Refresh token
      tags:
        - User
